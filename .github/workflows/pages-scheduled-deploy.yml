name: Scheduled GitHub Pages Deploy

on:
  schedule:
    - cron: "0 0 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do NOT cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/jekyll-gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write