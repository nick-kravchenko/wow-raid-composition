# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allows this workflow to be called by other workflows (e.g. scheduled deploy)
  workflow_call:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: npm install and npm run CI commands
        run: |
          export NODE_OPTIONS=--openssl-legacy-provider
          npm i
      - name: Bake WCL data
        # Runs before the Angular build so the generated file is available.
        # continue-on-error: true so a WCL outage never blocks a deploy.
        # If WCL_CLIENT_ID/SECRET are not set the script exits 0 silently,
        # keeping the last committed wcl-baked.data.ts as-is.
        continue-on-error: true
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
          WCL_SKIP_GEAR: ${{ vars.WCL_SKIP_GEAR }}
          WCL_DEFAULT_REALM: ${{ vars.WCL_DEFAULT_REALM }}
          WCL_DEFAULT_REGION: ${{ vars.WCL_DEFAULT_REGION }}
          WCL_ZONE_ID: ${{ vars.WCL_ZONE_ID }}
        run: npm run bake:wcl
      - name: Build Angular app
        run: |
          export NODE_OPTIONS=--openssl-legacy-provider
          npm run build:gpages
      - name: copy file
        uses: canastro/copy-file-action@master
        with:
          source: "./dist/wow-raid-composition/browser/index.html"
          target: "./dist/wow-raid-composition/browser/404.html"
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./dist/wow-raid-composition/browser
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
