<div class="totals">
  <ul>
    <li>Total players: {{players.length}}</li>
    <li>Total characters: {{charactersCount}}</li>
  </ul>
</div>
<ul class="players-list">
  @for (player of players; track player.name) {
    <li>
      <app-player-tile [player]="player"
                       [isWCLLinkVisible]="true"
                       [isRankingsVisible]="true"
                       [isGearVisible]="true"
      ></app-player-tile>
    </li>
  }
</ul>
