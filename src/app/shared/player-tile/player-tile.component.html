<h4>{{player.name}}:</h4>
<ul>
  @for (character of player.characters; track character.name) {
    <li>
      <app-character-tile [character]="character"
                          [isWCLLinkVisible]="isWCLLinkVisible"
                          [isRankingsVisible]="isRankingsVisible"
                          [isGearVisible]="isGearVisible"
      ></app-character-tile>
    </li>
  }
</ul>
